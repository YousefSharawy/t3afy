name: t3afy
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.0.0
  cherry_toast: ^1.12.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  easy_localization: ^3.0.7+1
  flutter_bloc: ^9.1.0
  flutter_rounded_progress_bar: ^0.3.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  internet_connection_checker: ^3.0.1
  json_annotation: ^4.11.0
  loader_overlay: ^5.0.0
  shared_preferences: ^2.5.2
  shimmer: ^3.0.0
  file_picker: ^10.3.8
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  dotted_border: ^3.1.0
  supabase_flutter: ^2.12.0
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  flutter_launcher_icons: ^0.14.4
  photo_view: ^0.15.0
  fluttertoast: ^9.0.0
  flutter_tts: ^4.2.5
  cached_network_image: ^3.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  azlistview: ^2.0.0
  scrollable_positioned_list: ^0.2.3
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.7
  pdf: ^3.11.1
  path_provider: ^2.1.2
  share_plus: ^10.0.2
  dotenv: ^4.2.0
  freezed: ^3.2.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  fl_chart: ^0.69.0
  tutorial_coach_mark: ^1.2.11
  # google_mobile_ads: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/Almarai-Light.ttf
          weight: 300
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 400